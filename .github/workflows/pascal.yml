name: The Tribunal Judgement

on: [pull_request]

jobs:
  ego_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Prose
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.x'

      - name: Invoke Pascal
        run: python .github/pascal_gatekeeper.py
