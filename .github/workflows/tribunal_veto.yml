name: The Tribunal's Eternal Veto

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ego_check:
    name: "⚖️ The Scribe's Ego-Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Heresy Check
        run: Python .github/pascal_gatekeeper.py
